<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.png?v=2" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#000000"
    />

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Open-source event management platform for communities, colleges, and organizations worldwide"
    />

    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/Eventra.png?v=2"
    />

    <!-- Preconnect for faster external resource loading -->
    <link rel="preconnect" href="https://api.github.com" />
    <link rel="dns-prefetch" href="https://api.github.com" />

    <link
      rel="preconnect"
      href="https://accounts.google.com"
      crossorigin
    />
    <link
      rel="dns-prefetch"
      href="https://accounts.google.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Manifest -->
    <link
      rel="manifest"
      href="%PUBLIC_URL%/manifest.json"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload Hero Image -->
    <link
      rel="preload"
      href="%PUBLIC_URL%/Eventra.png"
      as="image"
    />

    <!-- Prevent Theme Flickering -->
    <script>

    </script>

    <!-- Title -->
    <title>
      Eventra - Open Source Event Management Platform
    </title>

    <!-- Google Sign In -->
    <meta
      name="google-signin-client_id"
      content="%REACT_APP_GOOGLE_CLIENT_ID%"
    />

    <script
      src="https://accounts.google.com/gsi/client"
      async
      defer
    ></script>

    <!-- EmailJS -->
    <script
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
      async
    ></script>
  </head>

  <body class="bg-white text-black dark:bg-gray-900 dark:text-white">
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
  </body>
</html>
