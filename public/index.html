<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicons -->
    <link
      rel="icon"
      type="image/x-icon"
      href="%PUBLIC_URL%/favicon.ico"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%PUBLIC_URL%/favicon-32x32.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="%PUBLIC_URL%/favicon-16x16.png"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/apple-touch-icon.png"
    />

    <link
      rel="manifest"
      href="%PUBLIC_URL%/site.webmanifest"
    />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#0f172a"
    />

    <!--
      Security: upgrade-insecure-requests instructs the browser to treat all
      HTTP sub-resource requests (images, scripts, XHR) as HTTPS even before
      the Vercel HSTS header has been cached by the browser. This is a
      defence-in-depth companion to the Strict-Transport-Security response
      header set in vercel.json — the two together protect both the page load
      and every sub-resource it fetches.

      Note: HSTS itself cannot be set via <meta> — it must be a response
      header, which is why vercel.json is the authoritative source.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="upgrade-insecure-requests"
    />

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Open-source event management platform for communities, colleges, and organizations worldwide"
    />

    <!-- Preconnect for faster external resource loading -->
    <link rel="preconnect" href="https://api.github.com" />
    <link rel="dns-prefetch" href="https://api.github.com" />

    <link
      rel="preconnect"
      href="https://accounts.google.com"
      crossorigin
    />
    <link
      rel="dns-prefetch"
      href="https://accounts.google.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload Hero Image -->
    <link
      rel="preload"
      href="%PUBLIC_URL%/Eventra.png"
      as="image"
    />

    <!-- Prevent Theme Flickering -->
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("theme");
          const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = savedTheme || (systemDark ? "dark" : "light");

          document.documentElement.classList.add("no-transition");
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;

          window.addEventListener("load", () => {
            document.documentElement.classList.remove("no-transition");
          });
        } catch (e) {
          console.error("Theme initialization failed:", e);
        }
      })();
    </script>

    <!-- Title -->
    <title>
      Eventra - Open Source Event Management Platform
    </title>

    <!-- Google Sign In -->
    <meta
      name="google-signin-client_id"
      content="%REACT_APP_GOOGLE_CLIENT_ID%"
    />

    <script
      src="https://accounts.google.com/gsi/client"
      async
      defer
    ></script>

    <!-- EmailJS -->
    <script
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
      async
    ></script>
  </head>

  <body class="bg-white text-black dark:bg-gray-900 dark:text-white">
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>

    <div id="root"></div>
  </body>
</html>
