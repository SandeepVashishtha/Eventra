# nginx Configuration
#
# NOTE: Keep CSP in sync with middleware/csp.js (authoritative source).
#       Static deployments using nginx rely on this file for security
#       headers; the middleware/csp.js adds dynamic backend origins.
#       Update both when changing CSP directives.
#
# Rate limiting zone - 10 requests per second per IP, burst up to 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Request body size limit
client_max_body_size 10m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' https://fonts.googleapis.com; style-src-attr 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.github.com https://accounts.google.com https://www.googleapis.com https://api.emailjs.com; frame-src 'self' https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Apply rate limiting to API endpoints
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy timeouts to prevent slow HTTP attacks
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Buffer size for reading response headers
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 64k;

        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
