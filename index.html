<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" href="/Eventra.png" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#0f172a"
    />

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Open-source event management platform for communities, colleges, and organizations worldwide"
    />

    <meta
      name="keywords"
      content="Eventra, event management, open source events, community events, college events, conferences, meetups, event booking platform"
    />

    <meta
      name="author"
      content="Eventra Team"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <!-- Canonical URL -->
    <link
      rel="canonical"
      href="https://eventra.vercel.app/"
    />

    <!-- Open Graph Meta Tags -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:title"
      content="Eventra - Open Source Event Management Platform"
    />

    <meta
      property="og:description"
      content="Open-source event management platform for communities, colleges, and organizations worldwide"
    />

    <meta
      property="og:image"
      content="/Eventra.png"
    />

    <meta
      property="og:url"
      content="https://eventra.vercel.app/"
    />

    <meta
      property="og:site_name"
      content="Eventra"
    />

    <!-- Twitter Card Meta Tags -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Eventra - Open Source Event Management Platform"
    />

    <meta
      name="twitter:description"
      content="Open-source event management platform for communities, colleges, and organizations worldwide"
    />

    <meta
      name="twitter:image"
      content="/Eventra.png"
    />

    <!-- Apple Touch Icon -->
    <link
      rel="apple-touch-icon"
      href="/logo192.png"
    />
    <!-- Preconnect for faster external resource loading -->
    <link rel="preconnect" href="https://api.github.com" />
    <link rel="dns-prefetch" href="https://api.github.com" />

    <link
      rel="preconnect"
      href="https://accounts.google.com"
      crossorigin
    />
    <link
      rel="dns-prefetch"
      href="https://accounts.google.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Manifest -->
    <link
      rel="manifest"
      href="/manifest.json"
    />
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload Hero Image -->
    <link
      rel="preload"
      href="/Eventra.png"
      as="image"
    />

    <!-- Prevent Theme Flickering -->
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("theme");
          const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = savedTheme || (systemDark ? "dark" : "light");

          document.documentElement.classList.add("no-transition");
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;

          window.addEventListener("load", () => {
            document.documentElement.classList.remove("no-transition");
          });
        } catch (e) {
          console.error("Theme initialization failed:", e);
        }
      })();
    </script>

    <!-- Title -->
    <title>
      Eventra - Open Source Event Management Platform
    </title>

    <!-- Google Sign In -->


    <script
      src="https://accounts.google.com/gsi/client"
      async
      defer
    ></script>

    <!-- EmailJS -->
    <script
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
      async
    ></script>
  </head>

  <body class="bg-white text-black dark:bg-gray-900 dark:text-white">
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
