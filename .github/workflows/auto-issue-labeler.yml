name: Auto Issue Labeler

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label:
    name: Auto Label Issues
    runs-on: ubuntu-latest
    steps:
      - name: Auto Label based on Title/Body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          TITLE: ${{ github.event.issue.title }}
          BODY: ${{ github.event.issue.body }}
        run: |
          # Combine title and body and convert to lowercase
          CONTENT=$(echo "$TITLE $BODY" | tr '[:upper:]' '[:lower:]')

          if echo "$CONTENT" | grep -E -q 'bug|crash|fail|broken|error'; then
            echo "Labeling as bug..."
            gh issue edit "$ISSUE_URL" --add-label "bug" || true
          fi

          if echo "$CONTENT" | grep -E -q 'feature|feat|request|add'; then
            echo "Labeling as enhancement..."
            gh issue edit "$ISSUE_URL" --add-label "enhancement" || true
          fi

          if echo "$CONTENT" | grep -E -q 'doc|readme|guide|wiki'; then
            echo "Labeling as documentation..."
            gh issue edit "$ISSUE_URL" --add-label "documentation" || true
          fi

          if echo "$CONTENT" | grep -E -q 'ci|workflow|action|github'; then
            echo "Labeling as workflow..."
            gh issue edit "$ISSUE_URL" --add-label "dx" || true
          fi
