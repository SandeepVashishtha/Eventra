name: Auto Comment, Assign & Label on PR

on:
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.issue.number;

            const commentBody = `### Thanks for creating a PR for your Issue! ☺️\n\nWe'll review it as soon as possible.\nIn the meantime, please double-check the **file changes** and ensure that **all commits** are accurate.\n\nIf there are any **unresolved review comments**, feel free to resolve them. 🙌🏼`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
            if (process.env.NODE_ENV === "development") {
             console.log('Comment added successfully.');
            }

      - name: Auto-assign PR creator
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.issue.number;
            const creator = context.payload.pull_request.user.login;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              assignees: [creator]
            });
            if (process.env.NODE_ENV === "development") {
              console.log(`Assigned PR #${prNumber} to ${creator}`);
            }

      - name: Add gssoc:approved label
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.issue.number;
            const label = 'gssoc:approved';

            // Ensure the label exists in the repo before applying it
            const { data: repoLabels } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const labelExists = repoLabels.some(l => l.name === label);

            if (!labelExists) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'e4e669',
                description: 'Approved for GSSoC contribution'
              });
              console.log(`Label "${label}" created.`);
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [label]
            });
            if (process.env.NODE_ENV === "development") {
              console.log(`Label "${label}" added to PR #${prNumber}`);
            }