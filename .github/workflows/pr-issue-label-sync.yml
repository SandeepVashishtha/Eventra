name: PR ↔ Issue Label Sync

# Keeps labels in sync between a PR and every issue it references.
#
# DIRECTION: PR → linked issue(s)
#   When any label is added to or removed from a PR, the same change is
#   mirrored on every issue linked via Closes/Fixes/Resolves keywords.
#
# Skipped label namespaces (owned by dedicated workflows — never synced):
#   level:*   → issue-priority-labeler.yml
#   size/*    → size-labeler / pr-size-labeler
#   ai-*      → ai-detector.yml
#   spam      → issue-spam-detector.yml
#   invalid   → issue-spam-detector.yml
#   needs-*   → issue-spam-detector.yml
#   do-not-*  → do-not-merge.yml
#   gssoc:*   → pr-auto-assign.yml

on:
  pull_request_target:
    types: [opened, edited, reopened, labeled, unlabeled, synchronize]

concurrency:
  group: label-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  issues: write
  pull-requests: read

jobs:
  sync-labels:
    name: Sync PR Labels → Linked Issues
    runs-on: ubuntu-latest

    steps:
      - name: Mirror PR labels onto every linked issue
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr      = context.payload.pull_request;
            const prNum   = pr.number;
            const prBody  = pr.body || '';

            // ── Label namespaces that must NEVER be synced ────────────────
            // Each namespace is owned by a dedicated workflow; syncing would
            // create race conditions and incorrect labels on issues.
            const SKIP_PREFIXES = [
              'level:',        // issue-priority-labeler.yml
              'size/',         // size-labeler / pr-size-labeler
              'ai-',           // ai-detector.yml
              'spam',          // issue-spam-detector.yml
              'invalid',       // issue-spam-detector.yml
              'needs-',        // issue-spam-detector.yml
              'do-not-',       // do-not-merge.yml
              'gssoc:',        // pr-auto-assign.yml
              'hacktoberfest', // pr-label-inheritance.yml
            ];

            function shouldSkip(labelName) {
              return SKIP_PREFIXES.some(p => labelName.toLowerCase().startsWith(p));
            }

            // ── Parse linked issue numbers from PR body ───────────────────
            // Supports: Closes #1, Fixes #2, Resolves #3 (and plurals)
            const LINK_REGEX = /(?:closes?|fixes?|resolves?)\s*[:\-]?\s*((?:#\d+(?:\s*(?:,|and)\s*)?)+)/gi;
            const matches = [...prBody.matchAll(LINK_REGEX)];
            const linkedIssueNums = [
              ...new Set(
                matches.flatMap(m =>
                  [...m[1].matchAll(/#(\d+)/g)].map(x => parseInt(x[1], 10))
                )
              ),
            ];

            if (linkedIssueNums.length === 0) {
              console.log(`ℹ️  PR #${prNum} has no linked issues — nothing to sync`);
              return;
            }

            console.log(`\n🔗 PR #${prNum} linked issues: ${linkedIssueNums.join(', ')}`);

            // ── Get current PR labels (the source of truth) ───────────────
            const { data: prData } = await github.rest.issues.get({
              owner, repo, issue_number: prNum,
            });
            const prLabels = prData.labels
              .map(l => (typeof l === 'string' ? l : l.name))
              .filter(name => !shouldSkip(name));

            console.log(`🏷️  PR labels eligible for sync: ${prLabels.join(', ') || 'none'}`);

            // ── For each linked issue: ensure label parity ────────────────
            for (const issueNum of linkedIssueNums) {
              // Verify the linked item is an issue (not another PR)
              let issueData;
              try {
                const { data } = await github.rest.issues.get({
                  owner, repo, issue_number: issueNum,
                });
                if (data.pull_request) {
                  console.log(`⏭️  #${issueNum} is a PR, not an issue — skipping`);
                  continue;
                }
                issueData = data;
              } catch (e) {
                console.warn(`⚠️  Could not fetch #${issueNum}: ${e.message}`);
                continue;
              }

              const issueLabels = issueData.labels
                .map(l => (typeof l === 'string' ? l : l.name));

              // ── ADD: labels on PR but missing from issue ──────────────
              const toAdd = prLabels.filter(l => !issueLabels.includes(l));
              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNum, labels: toAdd,
                });
                console.log(`✅ Issue #${issueNum} — added: ${toAdd.join(', ')}`);
              }

              // ── REMOVE: syncable labels on issue but no longer on PR ──
              // Only remove labels that are in the syncable namespace —
              // never remove labels the issue picked up from other workflows.
              const toRemove = issueLabels.filter(l =>
                !shouldSkip(l) &&          // only manage syncable labels
                !prLabels.includes(l)      // PR no longer has it
              );
              for (const name of toRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: issueNum, name,
                  });
                  console.log(`🗑️  Issue #${issueNum} — removed: ${name}`);
                } catch (e) {
                  if (e.status !== 404) throw e; // 404 = already removed, safe to ignore
                }
              }

              if (toAdd.length === 0 && toRemove.length === 0) {
                console.log(`✔️  Issue #${issueNum} — already in sync, no changes needed`);
              }
            }
