name: Add GSSoC Approved Label

on:
  pull_request:
    types:
      - closed

permissions:
  pull-requests: write
  issues: write

jobs:
  add-label:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Add gssoc:approved label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "gssoc:approved"
