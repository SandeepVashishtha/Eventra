name: CI Quality Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint checks
        run: |
          if git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            BASE_REF="HEAD^1"
          else
            BASE_REF="HEAD~1"
          fi
          echo "Comparing against base: $BASE_REF"
          
          if ! CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE_REF" HEAD | grep -E '\.(js|jsx)$'); then
            echo "No changed JS/JSX files to lint."
            exit 0
          fi
          
          echo "Running ESLint on changed files:"
          echo "$CHANGED_FILES"
          
          CHANGED_FILES_SPACE=$(echo "$CHANGED_FILES" | tr '\n' ' ')
          npx eslint $CHANGED_FILES_SPACE --max-warnings=-1

      - name: Verify code formatting
        run: |
          if git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            BASE_REF="HEAD^1"
          else
            BASE_REF="HEAD~1"
          fi
          echo "Comparing against base: $BASE_REF"
          
          if ! CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE_REF" HEAD | grep -E '\.(js|jsx|css)$'); then
            echo "No changed files to verify formatting."
            exit 0
          fi
          
          echo "Verifying code formatting on changed files:"
          echo "$CHANGED_FILES"
          
          CHANGED_FILES_SPACE=$(echo "$CHANGED_FILES" | tr '\n' ' ')
          npx prettier --check $CHANGED_FILES_SPACE

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Production build verification
        run: CI=false npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7