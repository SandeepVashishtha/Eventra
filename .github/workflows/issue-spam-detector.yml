name: GSSoC — Issue Spam & AI Detector

# Monitors every newly opened or edited issue.
# Scores it across multiple heuristic checks:
#   • AI-generated boilerplate phrases
#   • Unfilled / empty template
#   • Irrelevant to the Eventra project
#   • Spam patterns (repetition, all-caps, random chars)
#   • Title too vague or meaningless
#   • Body too short
#   • Suspicious link / SEO spam
#
# Outcome:
#   SPAM / AI  →  apply `spam` + `invalid` labels, post explanation, CLOSE issue
#   LOW QUALITY → apply `needs-more-info` label, post guidance comment, leave OPEN
#   CLEAN       →  no action (let other workflows handle labeling)

on:
  issues:
    types: [opened, edited]

concurrency:
  group: issue-spam-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write

jobs:
  detect-spam:
    name: Detect Spam / AI Issues
    runs-on: ubuntu-latest

    steps:
      - name: Analyse issue and act
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue     = context.payload.issue;
            const issueNum  = issue.number;
            const issueTitle = (issue.title  || '');
            const issueBody  = (issue.body   || '');
            const titleLC    = issueTitle.toLowerCase();
            const bodyLC     = issueBody.toLowerCase();
            const author     = issue.user?.login || '';

            // ── Skip maintainer / bot accounts ───────────────────────────────
            const TRUSTED_USERS = ['Ayushh-Sharmaa', 'SandeepVashishtha', 'RhythmPahwa14', 'github-actions[bot]', 'dependabot[bot]'];
            if (TRUSTED_USERS.includes(author)) {
              console.log(`⏭️  Skipping trusted user @${author}`);
              return;
            }

            // ── Label helpers ─────────────────────────────────────────────────
            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                }
              }
            }

            async function addLabels(labels) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNum, labels });
            }

            // ── Score accumulators ────────────────────────────────────────────
            const spamFlags = [];    // hard violations → close
            const qualityFlags = []; // soft violations → request improvement

            // ════════════════════════════════════════════════════════════════
            // CHECK 1 — AI-generated boilerplate phrases
            // ════════════════════════════════════════════════════════════════
            const AI_PHRASES = [
              'as an ai language model',
              'i am an ai',
              'as a large language model',
              'i cannot assist with',
              "i'm sorry, but i",
              'certainly! here',
              'of course! here',
              'sure! here is',
              'please note that i',
              "it's important to note that",
              'as requested, here',
              'feel free to ask',
              'this is a placeholder',
              'lorem ipsum',
              'todo: add description',
              'add description here',
              '[add description]',
              'description goes here',
              'generated by chatgpt',
              'generated by claude',
              'generated by gemini',
              'powered by ai',
              'ai-generated',
              'note: i am an ai',
              'as your ai assistant',
              'i hope this helps!',
              'let me know if you need anything else',
              'happy to help!',
              'certainly, here is a',
              'here is an example of',
              'below is a detailed',
              'in summary, the above',
              'in conclusion,',
              'to summarize,',
            ];

            for (const phrase of AI_PHRASES) {
              if (bodyLC.includes(phrase) || titleLC.includes(phrase)) {
                spamFlags.push(`🤖 **AI-generated content detected** — phrase found: \`"${phrase}"\``);
                break;
              }
            }

            // ════════════════════════════════════════════════════════════════
            // CHECK 2 — Unfilled / empty template
            // ════════════════════════════════════════════════════════════════
            const bodyStripped = issueBody.replace(/\s+/g, '').length;
            if (bodyStripped < 40) {
              spamFlags.push(`📭 **Empty body** — issue description has only ${bodyStripped} non-whitespace characters (minimum: 40). Please describe the issue properly.`);
            }

            // Unfilled markdown template placeholder text
            const TEMPLATE_PLACEHOLDERS = [
              'a clear and concise description',
              'steps to reproduce the behavior',
              'ex. i\'m always frustrated when',
              'add any other context',
              'describe the bug',
              '<!-- issue number -->',
              'your issue here',
              'describe your issue',
            ];
            for (const ph of TEMPLATE_PLACEHOLDERS) {
              if (bodyLC.includes(ph)) {
                qualityFlags.push(`📋 **Unfilled template** — placeholder text found: \`"${ph}"\`. Please replace template hints with actual content.`);
                break;
              }
            }

            // ════════════════════════════════════════════════════════════════
            // CHECK 3 — Title quality
            // ════════════════════════════════════════════════════════════════
            // 3a. Too few meaningful words
            const titleWords = issueTitle.replace(/[^\p{L}\p{N}]+/gu, ' ').trim().split(/\s+/).filter(w => w.length > 1);
            if (titleWords.length < 3) {
              qualityFlags.push(`🏷️ **Vague title** — \`"${issueTitle}"\` has only ${titleWords.length} meaningful word(s). A good title should be descriptive (e.g., "Event card does not render on mobile screens").`);
            }

            // 3b. All-caps title (shouting / spam signal)
            if (issueTitle.length > 5 && issueTitle === issueTitle.toUpperCase() && /[A-Z]{4,}/.test(issueTitle)) {
              spamFlags.push(`📢 **ALL-CAPS title** — \`"${issueTitle}"\` appears to be shouting or auto-generated.`);
            }

            // 3c. Title is a random string (high ratio of non-word chars or gibberish)
            const nonWordRatio = (issueTitle.replace(/[\w\s]/g, '').length) / Math.max(issueTitle.length, 1);
            if (nonWordRatio > 0.4) {
              spamFlags.push(`🔤 **Gibberish title** — \`"${issueTitle}"\` appears to contain mostly symbols or random characters.`);
            }

            // ════════════════════════════════════════════════════════════════
            // CHECK 4 — Spam body patterns
            // ════════════════════════════════════════════════════════════════
            // 4a. Highly repetitive lines (copy-paste spam)
            const lines = issueBody.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const uniqueLines = new Set(lines);
            if (lines.length > 4 && uniqueLines.size / lines.length < 0.35) {
              spamFlags.push(`🔁 **Highly repetitive content** — ${Math.round((1 - uniqueLines.size / lines.length) * 100)}% of lines are duplicates. This is a strong spam signal.`);
            }

            // 4b. Suspicious external links / SEO spam
            const SEO_PATTERNS = [
              /\b(buy|purchase|cheap|discount|promo|coupon|offer)\b.*https?:\/\//i,
              /https?:\/\/[^\s]{60,}/,   // suspiciously long URLs
              /\[(click here|visit now|check this|free download)\]/i,
            ];
            for (const pat of SEO_PATTERNS) {
              if (pat.test(issueBody)) {
                spamFlags.push(`🔗 **Suspicious link / SEO spam** — the body contains marketing-style links or unusually long URLs.`);
                break;
              }
            }

            // 4c. Random character sequences (keyboard mashing)
            if (/[a-z]{15,}/i.test(issueTitle.replace(/\s/g, '')) && !/[aeiou]/i.test(issueTitle.slice(0, 8))) {
              spamFlags.push(`🎲 **Random characters in title** — the title looks like keyboard mashing or an auto-generated string.`);
            }

            // ════════════════════════════════════════════════════════════════
            // CHECK 5 — Project relevance (is this work needed for Eventra?)
            // ════════════════════════════════════════════════════════════════
            // Eventra is a React/Vite event & hackathon management platform.
            // If an issue has no relation to any of these topics, flag it.
            const RELEVANT_KEYWORDS = [
              // Core domain
              'event', 'hackathon', 'community', 'organizer', 'registration', 'dashboard',
              'profile', 'auth', 'login', 'signup', 'role', 'feedback', 'recommend',
              // Tech stack
              'react', 'vite', 'tailwind', 'component', 'hook', 'context', 'router',
              'api', 'backend', 'frontend', 'ui', 'ux', 'page', 'route', 'layout',
              // Dev ops / quality
              'test', 'lint', 'build', 'deploy', 'ci', 'workflow', 'docker', 'vercel',
              'netlify', 'playwright', 'storybook', 'eslint', 'prettier',
              // Common dev words
              'bug', 'fix', 'feature', 'refactor', 'performance', 'accessibility',
              'responsive', 'mobile', 'error', 'crash', 'loading', 'style', 'css',
              'animation', 'button', 'modal', 'form', 'input', 'card', 'nav', 'header',
              'footer', 'sidebar', 'filter', 'search', 'sort', 'pagination', 'table',
              'documentation', 'readme', 'contributing', 'security', 'dependency', 'npm',
              'notification', 'real-time', 'sse', 'socket', 'image', 'upload', 'file',
            ];

            const combinedText = `${titleLC} ${bodyLC}`;
            const hasRelevantKeyword = RELEVANT_KEYWORDS.some(kw => combinedText.includes(kw));

            if (!hasRelevantKeyword && bodyStripped > 40) {
              // Only flag irrelevance if the body actually has content (avoid double-flagging empty bodies)
              spamFlags.push(`🚫 **Irrelevant to Eventra** — this issue does not appear to be related to the Eventra event management platform. If this is a genuine issue, please re-read the project scope and include relevant details.`);
            }

            // ════════════════════════════════════════════════════════════════
            // CHECK 6 — Obvious test / dummy issues
            // ════════════════════════════════════════════════════════════════
            const TEST_PATTERNS = [
              /^(test|testing|hello|hi|hey|asdf|qwerty|123|abc|sample|dummy|temp)\s*$/i,
              /^test\s*(issue|pr|this|123)?$/i,
            ];
            for (const pat of TEST_PATTERNS) {
              if (pat.test(issueTitle.trim())) {
                spamFlags.push(`🧪 **Test / dummy issue** — title \`"${issueTitle}"\` appears to be a test submission, not a real issue.`);
                break;
              }
            }

            // ════════════════════════════════════════════════════════════════
            // DECISION
            // ════════════════════════════════════════════════════════════════
            console.log(`\n📊 Issue #${issueNum} — Spam flags: ${spamFlags.length}, Quality flags: ${qualityFlags.length}`);
            spamFlags.forEach(f => console.log('  🔴', f));
            qualityFlags.forEach(f => console.log('  🟡', f));

            // ── OUTCOME A: SPAM / AI confirmed → close ────────────────────
            if (spamFlags.length > 0) {
              await ensureLabel('spam',    'd93f0b', 'Spam, AI-generated, or irrelevant issue');
              await ensureLabel('invalid', 'e4e669', 'Not a valid issue for this project');

              await addLabels(['spam', 'invalid']);

              const commentBody = [
                `## 🚫 Issue Closed — Spam / AI-Generated Content Detected`,
                ``,
                `Hi @${author}, thank you for your interest in Eventra. Unfortunately, this issue has been **automatically closed** because it triggered one or more spam/quality filters:`,
                ``,
                spamFlags.map(f => `- ${f}`).join('\n'),
                ``,
                `---`,
                `### ✅ How to open a valid issue`,
                ``,
                `If you have a genuine bug report, feature request, or documentation suggestion, please:`,
                ``,
                `1. Use one of the **issue templates** provided (Bug Report, Feature Request, Documentation Update)`,
                `2. Write a **clear, descriptive title** (e.g., \`"Event card layout breaks on screens < 768px"\`)`,
                `3. Fill in **all required fields** — do not leave template placeholder text`,
                `4. Make sure the issue is **relevant to Eventra** (React/Vite event management platform)`,
                `5. Do **not** use AI tools to generate your issue description — write it in your own words`,
                ``,
                `📖 Read the [Contributing Guide](https://github.com/Ayushh-Sharmaa/Eventra/blob/main/CONTRIBUTING.md) before re-opening.`,
                ``,
                `---`,
                `_GSSoC'26 automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
              ].join('\n');

              await github.rest.issues.createComment({ owner, repo, issue_number: issueNum, body: commentBody });
              await github.rest.issues.update({ owner, repo, issue_number: issueNum, state: 'closed', state_reason: 'not_planned' });

              console.log(`\n🚫 Issue #${issueNum} CLOSED as spam/AI-generated (${spamFlags.length} violation(s))`);

            // ── OUTCOME B: Low quality → request improvement ───────────────
            } else if (qualityFlags.length > 0) {
              await ensureLabel('needs-more-info', '0075ca', 'More information needed from the author');

              await addLabels(['needs-more-info']);

              const commentBody = [
                `## ℹ️ More Information Needed`,
                ``,
                `Hi @${author}! Thanks for opening this issue. Before we can act on it, we need a bit more detail:`,
                ``,
                qualityFlags.map(f => `- ${f}`).join('\n'),
                ``,
                `Please **edit your issue** to address the points above. The issue will stay open for **7 days** — if it hasn't been updated by then, it may be closed automatically.`,
                ``,
                `💡 **Tip:** Use one of our issue templates (Bug Report / Feature Request / Documentation Update) — they guide you through exactly what we need.`,
                ``,
                `---`,
                `_GSSoC'26 automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
              ].join('\n');

              await github.rest.issues.createComment({ owner, repo, issue_number: issueNum, body: commentBody });

              console.log(`\n🟡 Issue #${issueNum} flagged for low quality (${qualityFlags.length} suggestion(s))`);

            // ── OUTCOME C: All clear ──────────────────────────────────────
            } else {
              console.log(`\n✅ Issue #${issueNum} passed all spam/quality checks — no action needed`);
            }
