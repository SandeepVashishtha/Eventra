name: PR Merge Conflict Labeler

# ──────────────────────────────────────────────────────────────────────────────
# Detects merge conflicts on all open PRs and keeps the label in sync:
#
#   conflict:merge-conflict  → added when PR cannot be merged into master
#                             removed automatically when the conflict is resolved
#
# Triggers:
#   • pull_request_target (opened / synchronize / reopened) — check the PR
#   • push to master — base branch changed, re-scan ALL open PRs
#   • schedule every 2 h — catch edge cases (GitHub's mergeable can be delayed)
#   • workflow_dispatch — run manually when needed
#
# Label namespace owned exclusively by this workflow: conflict:*
# ──────────────────────────────────────────────────────────────────────────────

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: write

jobs:
  label-conflicts:
    name: Detect and label merge conflicts
    runs-on: ubuntu-latest
    steps:
      - name: Check PRs for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const CONFLICT_LABEL = 'conflict:merge-conflict';
            const CONFLICT_META  = {
              color: 'B60205',
              description: '⚠️ This PR has a merge conflict that must be resolved before merging'
            };

            // ── Ensure label exists ────────────────────────────────────────
            try {
              await github.rest.issues.getLabel({ ...repo, name: CONFLICT_LABEL });
            } catch (err) {
              if (err.status !== 404) throw err;
              await github.rest.issues.createLabel({ ...repo, name: CONFLICT_LABEL, ...CONFLICT_META });
              console.log(`✅ Created label: ${CONFLICT_LABEL}`);
            }

            // ── Helper: check a single PR ──────────────────────────────────
            // GitHub computes `mergeable` asynchronously — it may be null on first
            // fetch. We retry up to 4 times with exponential back-off before giving up.
            async function checkPR(prNumber) {
              let mergeable = null;
              const delays = [3000, 6000, 12000, 20000]; // 3s, 6s, 12s, 20s

              for (let attempt = 0; attempt < delays.length + 1; attempt++) {
                const { data: pr } = await github.rest.pulls.get({ ...repo, pull_number: prNumber });
                mergeable = pr.mergeable;

                if (mergeable !== null) break;

                if (attempt < delays.length) {
                  const wait = delays[attempt];
                  console.log(`⏳ PR #${prNumber}: mergeable=null (attempt ${attempt + 1}/${delays.length + 1}) — waiting ${wait / 1000}s…`);
                  await new Promise(r => setTimeout(r, wait));
                }
              }

              if (mergeable === null) {
                console.log(`⚠️  PR #${prNumber}: mergeable still null after retries — skipping (will be caught by scheduled run)`);
                return;
              }

              // Fetch current labels (single call, cache result)
              const { data: issue } = await github.rest.issues.get({ ...repo, issue_number: prNumber });
              const hasConflictLabel = issue.labels.some(
                l => (typeof l === 'string' ? l : l.name) === CONFLICT_LABEL
              );

              if (mergeable === false) {
                if (!hasConflictLabel) {
                  await github.rest.issues.addLabels({ ...repo, issue_number: prNumber, labels: [CONFLICT_LABEL] });
                  console.log(`⚠️  PR #${prNumber}: conflict detected → added ${CONFLICT_LABEL}`);
                } else {
                  console.log(`ℹ️  PR #${prNumber}: already labeled with ${CONFLICT_LABEL}`);
                }
              } else {
                // mergeable === true — conflict is resolved
                if (hasConflictLabel) {
                  await github.rest.issues.removeLabel({ ...repo, issue_number: prNumber, name: CONFLICT_LABEL });
                  console.log(`✅ PR #${prNumber}: conflict resolved → removed ${CONFLICT_LABEL}`);
                } else {
                  console.log(`✔  PR #${prNumber}: no conflict, no label — clean`);
                }
              }
            }

            // ── Event routing ──────────────────────────────────────────────
            const eventName = context.eventName;
            console.log(`\n📣 Event: ${eventName}`);

            if (eventName === 'pull_request_target') {
              // Single PR changed — check only this one
              const prNumber = context.payload.pull_request.number;
              console.log(`Checking PR #${prNumber}…`);
              await checkPR(prNumber);

            } else {
              // push to master / schedule / workflow_dispatch
              // → re-check ALL open PRs (base changed or routine scan)
              console.log('Scanning all open PRs for merge conflicts…');

              const allPRs = await github.paginate(github.rest.pulls.list, {
                ...repo,
                state: 'open',
                per_page: 100
              });

              console.log(`Found ${allPRs.length} open PR(s)`);

              if (allPRs.length === 0) {
                console.log('No open PRs — nothing to do.');
                return;
              }

              // Process in batches of 5 to stay well within API rate limits
              // (GitHub allows ~5 000 requests/hour for authenticated apps)
              const BATCH_SIZE  = 5;
              const BATCH_DELAY = 2000; // 2 s gap between batches

              for (let i = 0; i < allPRs.length; i += BATCH_SIZE) {
                const batch = allPRs.slice(i, i + BATCH_SIZE);
                await Promise.all(batch.map(pr => checkPR(pr.number)));
                if (i + BATCH_SIZE < allPRs.length) {
                  await new Promise(r => setTimeout(r, BATCH_DELAY));
                }
              }

              console.log('✅ Conflict scan complete.');
            }
