name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect app changes
        id: changed-files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref }}"
            base_ref="origin/${{ github.event.pull_request.base.ref }}"
          else
            base_ref="${{ github.event.before }}"
          fi

          if ! git rev-parse --verify "$base_ref" >/dev/null 2>&1; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(git diff --name-only "$base_ref"...HEAD)
          app_files=$(printf '%s\n' "$changed_files" | grep -E '^(src|public|tests|scripts)/|^(package(-lock)?|vite\.config|eslint\.config|postcss\.config|tailwind\.config|tsconfig)\.' || true)

          if [ -n "$app_files" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node ${{ matrix.node-version }}
        if: steps.changed-files.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        if: steps.changed-files.outputs.app == 'true'
        run: npm ci

      - name: Lint
        if: steps.changed-files.outputs.app == 'true'
        run: npm run lint

      - name: TypeScript check
        if: steps.changed-files.outputs.app == 'true'
        run: npx tsc --noEmit --allowJs || true

      - name: Unit tests
        if: steps.changed-files.outputs.app == 'true'
        run: npm test 2>&1

      - name: Build
        if: steps.changed-files.outputs.app == 'true'
        run: npm run build
        env:
          NODE_ENV: production
