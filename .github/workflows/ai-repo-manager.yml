name: AI Repository Manager

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

# Give write permissions to comments, issues, and PR contents
permissions:
  issues: write
  pull_requests: write
  contents: read

jobs:
  ai-repo-manager:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-size: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # repo_manager.py does not require external python dependencies (uses urllib)

      - name: Run Spam & Duplicate Check
        if: github.event_name == 'issues'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python repo_manager.py --action check-spam --issue ${{ github.event.issue.number }}

      - name: Run PR Reviewer
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python repo_manager.py --action review-pr --pr ${{ github.event.pull_request.number }}

      - name: Manage Stale Assignments & Resolution Contests
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python repo_manager.py --action manage-assignments
