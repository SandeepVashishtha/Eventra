name: GSSoC — Do-Not-Merge Blocker

# Applies `do-not-merge` label when a PR is flagged for any of:
#   • Merge conflict (mergeable_state = dirty)
#   • AI-generated / low-effort slop (body is templated, generic, or AI-phrased)
#   • Spam patterns (mass-whitespace edits, trivial readme bumps, etc.)
#   • Missing required checklist items
#   • No linked issue
#   • Duplicate / WIP title prefix
#
# Also REMOVES the label if all checks later pass (e.g. after a force-push).

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review]

concurrency:
  group: dnm-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write

jobs:
  do-not-merge-check:
    name: Do-Not-Merge Check
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate PR and apply / remove do-not-merge label
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr       = context.payload.pull_request;
            const prNum    = pr.number;
            const prTitle  = (pr.title  || '');
            const prBody   = (pr.body   || '');
            const titleLC  = prTitle.toLowerCase();
            const bodyLC   = prBody.toLowerCase();

            const DNM_LABEL   = 'do-not-merge';
            const DNM_COLOR   = 'b60205';
            const DNM_DESC    = 'This PR must not be merged — see comments for required fixes';

            // ────────────────────────────────────────────────────────────────
            // 0.  Ensure the label exists in the repo
            // ────────────────────────────────────────────────────────────────
            async function ensureDnmLabel() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: DNM_LABEL });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo,
                    name: DNM_LABEL,
                    color: DNM_COLOR,
                    description: DNM_DESC,
                  });
                  console.log('✅ Created label: do-not-merge');
                }
              }
            }

            // ────────────────────────────────────────────────────────────────
            // 1.  MERGE-CONFLICT detection
            //     GitHub sets mergeable_state = 'dirty' when conflicts exist.
            //     We re-fetch the PR to get the latest mergeability state.
            // ────────────────────────────────────────────────────────────────
            async function hasMergeConflict() {
              // mergeability is computed async by GitHub; retry up to 5× with backoff
              for (let attempt = 1; attempt <= 5; attempt++) {
                const { data: freshPr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                if (freshPr.mergeable !== null) {
                  const conflicted = freshPr.mergeable_state === 'dirty' || freshPr.mergeable === false;
                  console.log(`Mergeability: mergeable=${freshPr.mergeable}, state=${freshPr.mergeable_state}`);
                  return conflicted;
                }
                console.log(`Mergeability not yet computed (attempt ${attempt}/5) — waiting 4s…`);
                await new Promise(r => setTimeout(r, 4000));
              }
              console.log('⚠️  Could not determine mergeability — skipping conflict check');
              return false;
            }

            // ────────────────────────────────────────────────────────────────
            // 2.  AI-SLOP / SPAM heuristics  (title + body signals)
            // ────────────────────────────────────────────────────────────────
            function detectAiOrSpam() {
              const flags = [];

              // 2a. Classic AI-generated boilerplate phrases
              const aiPhrases = [
                'as an ai language model',
                'i am an ai',
                'as a large language model',
                'i cannot assist with',
                'i\'m sorry, but i',
                'certainly! here',
                'of course! here',
                'sure! here is',
                'please note that i',
                'it\'s important to note that',
                'as requested, here',
                'feel free to ask',
                'this is a placeholder',
                'lorem ipsum',
                'todo: add description',
                'add description here',
                '[add description]',
                'description goes here',
              ];
              for (const phrase of aiPhrases) {
                if (bodyLC.includes(phrase)) {
                  flags.push(`AI boilerplate detected: "${phrase}"`);
                  break;
                }
              }

              // 2b. Suspiciously short / empty body (< 50 chars, excluding whitespace)
              const bodyStripped = prBody.replace(/\s+/g, '').length;
              if (bodyStripped < 50) {
                flags.push(`PR description is too short (${bodyStripped} non-whitespace chars — minimum 50)`);
              }

              // 2c. Title is a WIP / Draft / Do-not-merge marker
              const wipPatterns = [/^\s*wip[\s:\-]/i, /^\s*\[wip\]/i, /^\s*draft[\s:\-]/i, /^\s*\[draft\]/i, /^\s*do.not.merge/i, /^\s*dnm[\s:\-]/i];
              for (const pat of wipPatterns) {
                if (pat.test(titleLC)) {
                  flags.push(`Title indicates WIP / Draft / Do-not-merge: "${prTitle}"`);
                  break;
                }
              }

              // 2d. Title contains no meaningful content (only emojis / numbers / punctuation)
              const titleWords = prTitle.replace(/[^\p{L}\p{N}]+/gu, ' ').trim().split(/\s+/).filter(w => w.length > 1);
              if (titleWords.length < 2) {
                flags.push(`PR title is too vague or non-descriptive: "${prTitle}"`);
              }

              // 2e. Body appears to be the unedited template (contains placeholder issue numbers)
              if (/fixes\s+#\{issue_number\}/i.test(prBody) || /fixes\s+#issue/i.test(prBody)) {
                flags.push('PR body contains unfilled template placeholder (e.g., Fixes #{issue_number})');
              }

              // 2f. Spam signal — body is entirely repeated characters / lines
              const lines = prBody.split('\n').map(l => l.trim()).filter(l => l.length > 0);
              const uniqueLines = new Set(lines);
              if (lines.length > 3 && uniqueLines.size / lines.length < 0.4) {
                flags.push('PR body contains highly repetitive content (possible spam)');
              }

              return flags;
            }

            // ────────────────────────────────────────────────────────────────
            // 3.  CHECKLIST check — at least ONE box must be ticked
            // ────────────────────────────────────────────────────────────────
            function hasNoTickedCheckboxes() {
              const ticked = (prBody.match(/- \[x\]/gi) || []).length;
              const total  = (prBody.match(/- \[[ x]\]/gi) || []).length;
              if (total === 0) return false; // no checklist at all — not our job to flag here
              if (ticked === 0) {
                return 'PR has a checklist but no boxes are ticked — self-review not completed';
              }
              return false;
            }

            // ────────────────────────────────────────────────────────────────
            // 4.  NO LINKED ISSUE check
            // ────────────────────────────────────────────────────────────────
            function hasNoLinkedIssue() {
              const linked = /(?:closes|fixes|resolves|refs?|references?)\s+#\d+/i.test(prBody);
              if (!linked) {
                return 'PR does not reference a linked issue (e.g., Fixes #123)';
              }
              return false;
            }

            // ────────────────────────────────────────────────────────────────
            // 5.  TRIVIAL / WHITESPACE-ONLY DIFF check
            // ────────────────────────────────────────────────────────────────
            async function isTrivialDiff() {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner, repo, pull_number: prNum, per_page: 100,
              });

              const totalAdditions = files.reduce((s, f) => s + f.additions, 0);
              const totalDeletions = files.reduce((s, f) => s + f.deletions, 0);
              const totalChanges   = totalAdditions + totalDeletions;

              // Flag PRs that touch ONLY readme/docs with a negligible line change
              const onlyReadme = files.every(f =>
                /readme|\.md$|\.txt$|\.rst$/i.test(f.filename)
              );
              if (onlyReadme && totalChanges <= 5) {
                return `Trivial README-only change (${totalChanges} lines changed) with no substance`;
              }

              // Flag PRs that are pure whitespace / punctuation edits
              const allPatchWhitespace = files.every(f => {
                if (!f.patch) return true;
                const meaningfulLines = f.patch
                  .split('\n')
                  .filter(l => l.startsWith('+') || l.startsWith('-'))
                  .filter(l => l.slice(1).trim().length > 0);
                return meaningfulLines.length === 0;
              });
              if (allPatchWhitespace && files.length > 0) {
                return 'PR contains only whitespace changes — no meaningful diff';
              }

              return false;
            }

            // ────────────────────────────────────────────────────────────────
            // ── MAIN ─────────────────────────────────────────────────────────
            // ────────────────────────────────────────────────────────────────
            await ensureDnmLabel();

            const violations = [];

            // Run all checks concurrently where possible
            const [conflicted, trivial] = await Promise.all([
              hasMergeConflict(),
              isTrivialDiff(),
            ]);

            if (conflicted) violations.push('🔴 **Merge conflict** — this branch cannot be merged cleanly into the base branch. Please rebase or resolve conflicts.');
            if (trivial)    violations.push(`🔴 **Trivial / whitespace-only diff** — ${trivial}`);

            const spamFlags = detectAiOrSpam();
            for (const f of spamFlags) violations.push(`🔴 **AI / spam signal** — ${f}`);

            const checklistIssue = hasNoTickedCheckboxes();
            if (checklistIssue) violations.push(`🔴 **Incomplete checklist** — ${checklistIssue}`);

            const issueLinkIssue = hasNoLinkedIssue();
            if (issueLinkIssue) violations.push(`🔴 **Missing linked issue** — ${issueLinkIssue}`);

            // ── Fetch current labels ──────────────────────────────────────────
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: prNum });
            const hasLabel = currentLabels.some(l => l.name === DNM_LABEL);

            if (violations.length > 0) {
              // Apply the label if not already present
              if (!hasLabel) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNum, labels: [DNM_LABEL] });
                console.log(`🏷️  Applied do-not-merge label to PR #${prNum}`);
              }

              // Post / update a blocking comment
              const body = [
                `## ⛔ Do-Not-Merge — Action Required`,
                ``,
                `This PR has been flagged and the \`do-not-merge\` label has been applied for the following reason(s):`,
                ``,
                violations.map(v => `- ${v}`).join('\n'),
                ``,
                `---`,
                `**Please fix the issue(s) above and push an update.** The label will be automatically removed once all checks pass.`,
                ``,
                `_GSSoC'26 automation · [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
              ].join('\n');

              // Find and update existing bot comment, or create a new one
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNum });
              const botComment = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('⛔ Do-Not-Merge — Action Required')
              );

              if (botComment) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: botComment.id, body });
                console.log('📝 Updated existing do-not-merge bot comment');
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNum, body });
                console.log('📝 Posted do-not-merge comment');
              }

              console.log(`\n⛔ PR #${prNum} blocked — ${violations.length} violation(s) found.`);
            } else {
              // All checks pass — remove label if it was previously applied
              if (hasLabel) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNum, name: DNM_LABEL });
                console.log(`✅ Removed do-not-merge label from PR #${prNum} — all checks pass`);

                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNum,
                  body: [
                    `## ✅ Do-Not-Merge Label Removed`,
                    ``,
                    `All automated checks now pass. The \`do-not-merge\` label has been removed.`,
                    ``,
                    `_GSSoC'26 automation · [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
                  ].join('\n'),
                });
              } else {
                console.log(`✅ PR #${prNum} passed all do-not-merge checks — no action needed`);
              }
            }
