name: PR Auto Assign

# ──────────────────────────────────────────────────────────────────────────────
# Assigns the PR to its author when it is first opened.
#
# Note: gssoc:approved is intentionally NOT added here.
# It is now managed by pr-status-lifecycle.yml and is only awarded once
# the Vercel deployment succeeds — ensuring the label is meaningful.
# ──────────────────────────────────────────────────────────────────────────────

on:
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-author:
    name: Assign PR to its author
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to creator
        uses: actions/github-script@v7
        with:
          script: |
            const pr     = context.payload.pull_request;
            const prNum  = pr.number;
            const author = pr.user.login;
            const repo   = { owner: context.repo.owner, repo: context.repo.repo };

            // Assign PR to its author
            try {
              await github.rest.issues.addAssignees({
                ...repo,
                issue_number: prNum,
                assignees:    [author],
              });
              console.log(`👤 Assigned PR #${prNum} to @${author}`);
            } catch (err) {
              console.error(`❌ Failed to assign PR #${prNum}: ${err.message}`);
            }
