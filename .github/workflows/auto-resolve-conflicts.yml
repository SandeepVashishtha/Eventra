name: Auto-Resolve Merge Conflicts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Find open PRs targeting master
        id: find-prs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --base master \
            --json number,headRefName \
            > prs.json
          echo "count=$(jq length prs.json)" >> "$GITHUB_OUTPUT"
          echo "prs=$(jq -c '.' prs.json)" >> "$GITHUB_OUTPUT"

      - name: Resolve merge conflicts
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PRS='${{ steps.find-prs.outputs.prs }}'

          echo "$PRS" | jq -c '.[]' | while read -r pr; do
            number=$(echo "$pr" | jq -r '.number')
            branch=$(echo "$pr" | jq -r '.headRefName')

            echo "=== PR #$number ($branch) ==="

            gh pr checkout "$number"

            if ! git merge origin/master --no-commit --no-ff 2>&1 | grep -q "CONFLICT"; then
              git merge --abort 2>/dev/null || true
              echo "  No conflicts - skipping."
              continue
            fi

            for file in $(git diff --name-only --diff-filter=U); do
              echo "  Resolving $file"
              python3 -c "
import re
with open('$file', 'r') as f:
    content = f.read()
result = re.sub(
    r'<<<<<<< .*?\n(.*?)=======\n(.*?)>>>>>>> .*?\n',
    r'\1\2',
    content,
    flags=re.DOTALL
)
with open('$file', 'w') as f:
    f.write(result)
"
              git add "$file"
            done

            git commit -m "auto-resolve PR #$number merge conflicts (accept both changes)"

            remote=$(git rev-parse --abbrev-ref --symbolic-full-name '@{upstream}' 2>/dev/null | cut -d/ -f1)
            remote="${remote:-origin}"
            git push "$remote" "$branch"

            echo "  PR #$number resolved and pushed."
          done