name: Issue Quality Labeler

# Mirrors PR Quality Labeler — scores every issue on how well it is written
# and how actionable it is. Awards quality:well-described or quality:exemplary
# labels to encourage high-quality contributions from the start.
#
# Scoring (max 10):
#   +1  Title is descriptive (≥ 5 meaningful words)
#   +1  Body is detailed (≥ 200 non-whitespace chars)
#   +1  Steps to reproduce / clear description of expected vs actual
#   +1  Mentions environment (browser, OS, Node version, etc.)
#   +1  Includes screenshots, logs, or error output
#   +1  References a related issue or PR
#   +1  All required template checkboxes appear ticked  (- [x])
#   +1  Uses a structured template (has ## section headers)
#   +1  Mentions the specific component / file / page affected
#   +1  Proposes a solution or implementation idea
#
# Thresholds:
#   score ≥ 3  → quality:well-described
#   score ≥ 6  → quality:exemplary

on:
  issues:
    types: [opened, edited, reopened]

concurrency:
  group: issue-quality-label-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write

jobs:
  assign-quality-label:
    name: Assign issue quality label
    runs-on: ubuntu-latest

    steps:
      - name: Score and apply quality label
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue      = context.payload.issue;
            const issueNum   = issue.number;
            const issueTitle = (issue.title || '');
            const issueBody  = (issue.body  || '');
            const titleLC    = issueTitle.toLowerCase();
            const bodyLC     = issueBody.toLowerCase();

            // ── Label catalogue ────────────────────────────────────────────
            const QUALITY_LABELS = ['quality:well-described', 'quality:exemplary'];

            const LABEL_META = {
              'quality:well-described': {
                color: '0E8A16',
                description: 'Clear, actionable, and well-structured issue',
              },
              'quality:exemplary': {
                color: '006B75',
                description: 'Exceptional issue — thorough, reproducible, and exemplary',
              },
            };

            // ── Scoring heuristics ─────────────────────────────────────────
            function scoreIssue() {
              let score = 0;
              const reasons = [];

              // 1. Descriptive title (≥ 5 meaningful words)
              const titleWords = issueTitle
                .replace(/[^\p{L}\p{N}]+/gu, ' ')
                .trim()
                .split(/\s+/)
                .filter(w => w.length > 1);
              if (titleWords.length >= 5) {
                score++;
                reasons.push(`+1 Descriptive title (${titleWords.length} words)`);
              }

              // 2. Detailed body (≥ 200 non-whitespace chars)
              const bodyStripped = issueBody.replace(/\s+/g, '').length;
              if (bodyStripped >= 200) {
                score++;
                reasons.push(`+1 Detailed body (${bodyStripped} non-whitespace chars)`);
              }

              // 3. Steps to reproduce / expected vs actual
              if (
                /steps to reproduce|to reproduce|expected behavior|expected outcome|actual behavior|actual result/i.test(issueBody) ||
                /1\.\s.+\n2\.\s/i.test(issueBody)
              ) {
                score++;
                reasons.push('+1 Steps to reproduce / expected vs actual provided');
              }

              // 4. Environment details
              if (
                /browser|chrome|firefox|safari|edge|os:|windows|macos|linux|node|npm|version:/i.test(issueBody)
              ) {
                score++;
                reasons.push('+1 Environment details mentioned');
              }

              // 5. Screenshots, logs, or error output
              if (
                /screenshot|screen recording|console error|error log|stack trace|error output|attached|paste.*log/i.test(bodyLC) ||
                /```[\s\S]*?```/.test(issueBody)  // has a code block (log / error output)
              ) {
                score++;
                reasons.push('+1 Screenshots, logs, or error output included');
              }

              // 6. References a related issue or PR
              if (/(?:closes|fixes|resolves|refs?|references?|related to|see also)\s+#\d+/i.test(issueBody)) {
                score++;
                reasons.push('+1 References a related issue or PR');
              }

              // 7. Checklist ticked
              const ticked = (issueBody.match(/- \[x\]/gi) || []).length;
              const total  = (issueBody.match(/- \[[ x]\]/gi) || []).length;
              if (total > 0 && ticked === total) {
                score++;
                reasons.push(`+1 All ${total} checklist item(s) ticked`);
              } else if (ticked > 0) {
                score += 0.5; // partial credit — not logged but counted
              }

              // 8. Uses structured template headers
              const headers = (issueBody.match(/^##\s+/gm) || []).length;
              if (headers >= 2) {
                score++;
                reasons.push(`+1 Structured with ${headers} section headers`);
              }

              // 9. Mentions a specific component, file, or page
              if (
                /component|\.jsx|\.tsx|\.js|\.ts|\.css|\/src\/|\/pages?\/|\/components?\/|\/hooks?\/|\/utils?\//i.test(issueBody)
              ) {
                score++;
                reasons.push('+1 Specific component / file / path mentioned');
              }

              // 10. Proposes a solution or implementation idea
              if (
                /proposed solution|suggestion|implementation|could be fixed|we could|potential fix|i think we|approach|alternatively/i.test(bodyLC)
              ) {
                score++;
                reasons.push('+1 Proposes a solution or implementation idea');
              }

              return { score: Math.floor(score), reasons };
            }

            // ── Helpers ────────────────────────────────────────────────────
            async function ensureLabels() {
              await Promise.all(
                Object.entries(LABEL_META).map(async ([name, { color, description }]) => {
                  try {
                    await github.rest.issues.getLabel({ owner, repo, name });
                  } catch (err) {
                    if (err.status !== 404) throw err;
                    await github.rest.issues.createLabel({ owner, repo, name, color, description });
                    console.log(`✅ Created label: ${name}`);
                  }
                })
              );
            }

            async function getCurrentLabels() {
              const { data } = await github.rest.issues.get({ owner, repo, issue_number: issueNum });
              return data.labels.map(l => (typeof l === 'string' ? l : l.name));
            }

            // ── Main ───────────────────────────────────────────────────────
            const { score, reasons } = scoreIssue();

            let targetLabel = null;
            if (score >= 6) {
              targetLabel = 'quality:exemplary';
            } else if (score >= 3) {
              targetLabel = 'quality:well-described';
            }

            console.log(`Issue #${issueNum} quality score: ${score}/10`);
            reasons.forEach(r => console.log(`  ${r}`));
            console.log(`Target quality label: ${targetLabel || 'none (score < 3)'}`);

            await ensureLabels();
            const current = await getCurrentLabels();

            // Remove stale quality:* labels only — never touch other namespaces
            const stale = current.filter(l => QUALITY_LABELS.includes(l) && l !== targetLabel);
            for (const name of stale) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNum, name });
              console.log(`🗑 Removed stale quality label: ${name}`);
            }

            if (targetLabel && !current.includes(targetLabel)) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNum, labels: [targetLabel] });
              console.log(`🏷️  Applied quality label: ${targetLabel}`);
            } else if (!targetLabel) {
              console.log('Issue quality score below threshold — no quality label applied.');
            } else {
              console.log(`Quality label already correct: ${targetLabel} — skipping.`);
            }
