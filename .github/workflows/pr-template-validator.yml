name: PR Template Validator

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Template Checklist
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Description Checklist
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "Error: PR description is empty. Please fill out the PR template."
            exit 1
          fi

          echo "Checking PR description checklist compliance..."

          # Check if at least one checkbox is filled, e.g. - [x]
          if echo "$PR_BODY" | grep -q '\[x\]'; then
            echo "Checklist is filled out correctly."
          else
            echo "Error: No completed checklist items found (e.g. - [x] Tested locally). Please fill out the checklist in your PR."
            exit 1
          fi
