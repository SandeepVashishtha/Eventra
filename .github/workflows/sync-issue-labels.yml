name: Sync Issue Labels to PR

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: write
  issues: read

jobs:
  sync-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Copy issue labels to PR
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";

            // Match issue references like Fixes #123 / Closes #123
            const regex = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/gi;

            let match;
            const issueNumbers = [];

            while ((match = regex.exec(prBody)) !== null) {
              issueNumbers.push(match[3]);
            }

            if (issueNumbers.length === 0) {
              console.log("No linked issues found.");
              return;
            }

            const allLabels = new Set();

            for (const issueNumber of issueNumbers) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
              });

              issue.labels.forEach(label => {
                allLabels.add(label.name);
              });
            }

            const labelsArray = [...allLabels];

            if (labelsArray.length === 0) {
              console.log("No labels found on linked issues.");
              return;
            }

            console.log("Applying labels:", labelsArray);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: labelsArray,
            });
