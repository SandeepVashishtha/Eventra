name: Issue Priority Labeler

# Mirrors PR Difficulty Labeler — assigns a priority/effort level to every
# issue based on keywords, scope signals, and the area of work described.
# Uses the same level:* label catalogue as the PR difficulty workflow so
# that issue → PR difficulty inheritance stays consistent.
#
# Priority tiers:
#   level:beginner     — typo, minor UI tweak, small doc fix, good-first-issue scope
#   level:intermediate — moderate feature, contained bug, refactor of one component
#   level:advanced     — multi-component change, new page, significant architecture work
#   level:critical     — auth, security, core routing, data loss, or breaking change

on:
  issues:
    types: [opened, edited, reopened]

concurrency:
  group: issue-priority-label-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write

jobs:
  assign-priority-label:
    name: Assign issue priority label
    runs-on: ubuntu-latest

    steps:
      - name: Detect and apply priority label
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue      = context.payload.issue;
            const issueNum   = issue.number;
            const issueTitle = (issue.title || '').toLowerCase();
            const issueBody  = (issue.body  || '').toLowerCase();
            const combined   = `${issueTitle} ${issueBody}`;

            // ── Label catalogue (same as difficulty.yml for PRs) ────────────
            const LEVEL_LABELS = ['level:beginner', 'level:intermediate', 'level:advanced', 'level:critical'];

            const LABEL_META = {
              'level:beginner':     { color: '0E8A16', description: 'Small, low-risk change — great for first-time contributors' },
              'level:intermediate': { color: 'FBCA04', description: 'Medium effort — contained feature or fix' },
              'level:advanced':     { color: 'D93F0B', description: 'Significant effort — multi-component or architectural work' },
              'level:critical':     { color: 'B60205', description: 'Critical — auth, security, core routes, or breaking change' },
            };

            // ── Keyword signal maps ─────────────────────────────────────────

            // Words that strongly suggest BEGINNER / trivial scope
            const BEGINNER_SIGNALS = [
              'typo', 'spelling', 'grammar', 'punctuation', 'whitespace', 'indentation',
              'colour', 'color', 'font size', 'padding', 'margin', 'tooltip', 'placeholder text',
              'rename variable', 'rename file', 'comment', 'console.log', 'unused import',
              'good first issue', 'first issue', 'starter', 'easy', 'trivial', 'minor', 'small',
              'broken link', 'dead link', 'missing alt', 'alt text', 'trailing space',
              'update readme', 'readme fix', 'add screenshot', 'update screenshot',
            ];

            // Words that suggest INTERMEDIATE scope
            const INTERMEDIATE_SIGNALS = [
              'add feature', 'new feature', 'add component', 'new component', 'add page',
              'form validation', 'input validation', 'api call', 'api integration', 'fetch',
              'filter', 'search', 'pagination', 'sorting', 'modal', 'dialog', 'toast',
              'notification', 'loading state', 'skeleton', 'error boundary', 'hook',
              'custom hook', 'context', 'dark mode', 'responsive', 'mobile view',
              'animation', 'transition', 'accessibility', 'a11y', 'performance',
              'refactor component', 'improve ux', 'improve ui', 'add test', 'unit test',
            ];

            // Words that suggest ADVANCED scope
            const ADVANCED_SIGNALS = [
              'new page', 'new route', 'new section', 'architecture', 'redesign',
              'overhaul', 'rewrite', 'migrate', 'upgrade dependency', 'upgrade react',
              'multi-step', 'real-time', 'sse', 'websocket', 'socket', 'oauth',
              'role-based', 'rbac', 'dashboard', 'analytics', 'file upload', 'image upload',
              'storage', 'caching', 'state management', 'global state', 'complex',
              'large', 'major feature', 'significant', 'extensive', 'multiple components',
              'end-to-end', 'e2e', 'playwright', 'storybook integration',
            ];

            // Words that trigger CRITICAL (security / core / breaking)
            const CRITICAL_SIGNALS = [
              'security', 'vulnerability', 'vuln', 'cve', 'xss', 'csrf', 'injection',
              'sql injection', 'auth', 'authentication', 'authorization', 'jwt', 'token leak',
              'session', 'password', 'secret', 'credential', 'breaking change', 'breaking',
              'data loss', 'corruption', 'core routing', 'router', 'entry point', 'index.jsx',
              'app.jsx', 'middleware', 'env variable', 'environment variable', 'production bug',
              'prod bug', 'critical', 'urgent', 'hotfix', 'regression in main', 'regression in prod',
            ];

            // ── Scoring ────────────────────────────────────────────────────
            function classify(text) {
              // Critical first — any single critical signal overrides everything
              if (CRITICAL_SIGNALS.some(s => text.includes(s))) return 'level:critical';

              const advancedScore = ADVANCED_SIGNALS.filter(s => text.includes(s)).length;
              const intermedScore = INTERMEDIATE_SIGNALS.filter(s => text.includes(s)).length;
              const beginnerScore = BEGINNER_SIGNALS.filter(s => text.includes(s)).length;

              console.log(`  Signal counts — beginner:${beginnerScore} intermediate:${intermedScore} advanced:${advancedScore}`);

              if (advancedScore >= 2) return 'level:advanced';
              if (advancedScore >= 1 && intermedScore >= 2) return 'level:advanced';
              if (intermedScore >= 2) return 'level:intermediate';
              if (intermedScore >= 1) return 'level:intermediate';
              if (beginnerScore >= 1) return 'level:beginner';

              // Default: intermediate (most issues are of moderate scope)
              return 'level:intermediate';
            }

            // ── Helpers ────────────────────────────────────────────────────
            async function ensureLabels() {
              await Promise.all(
                Object.entries(LABEL_META).map(async ([name, { color, description }]) => {
                  try {
                    await github.rest.issues.getLabel({ owner, repo, name });
                  } catch (err) {
                    if (err.status !== 404) throw err;
                    await github.rest.issues.createLabel({ owner, repo, name, color, description });
                    console.log(`✅ Created label: ${name}`);
                  }
                })
              );
            }

            async function getCurrentLabels() {
              const { data } = await github.rest.issues.get({ owner, repo, issue_number: issueNum });
              return data.labels.map(l => (typeof l === 'string' ? l : l.name));
            }

            async function applyLabel(target) {
              const current = await getCurrentLabels();

              // Remove stale level:* labels (never touch other label namespaces)
              const stale = current.filter(l => LEVEL_LABELS.includes(l) && l !== target);
              await Promise.all(
                stale.map(name =>
                  github.rest.issues.removeLabel({ owner, repo, issue_number: issueNum, name })
                    .then(() => console.log(`🗑 Removed stale level label: ${name}`))
                )
              );

              if (current.includes(target) && stale.length === 0) {
                console.log(`✔ Level label already correct: ${target} — skipping.`);
                return;
              }
              if (!current.includes(target)) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issueNum, labels: [target] });
                console.log(`🏷️  Applied level label: ${target}`);
              }
            }

            // ── Main ───────────────────────────────────────────────────────
            console.log(`Issue #${issueNum} | Title: "${issue.title}"`);

            await ensureLabels();
            const target = classify(combined);

            console.log(`  → Priority: ${target}`);
            await applyLabel(target);
