name: GSSoC — Mentor Label on Open

# Applies `mentor:Ayushh-Sharmaa` label immediately when any issue OR pull
# request is opened. This guarantees the mentor label is present from day one,
# regardless of reviewer assignment or review submission events.

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

concurrency:
  group: mentor-open-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write

jobs:
  apply-mentor-label-on-open:
    name: Apply Mentor Label on Open
    runs-on: ubuntu-latest

    steps:
      - name: Apply mentor label to newly opened issue or PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const MENTOR_USERNAME = 'Ayushh-Sharmaa';
            const MENTOR_LABEL    = `mentor:${MENTOR_USERNAME}`;
            const LABEL_COLOR     = '6f42c1';

            const event     = context.eventName;
            const itemNum   = event === 'issues'
              ? context.payload.issue.number
              : context.payload.pull_request.number;
            const itemType  = event === 'issues' ? 'issue' : 'PR';

            // ── Ensure the mentor label exists in the repo ────────────────────
            try {
              await github.rest.issues.getLabel({ owner, repo, name: MENTOR_LABEL });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo,
                  name: MENTOR_LABEL,
                  color: LABEL_COLOR,
                  description: `GSSoC: Mentor — @${MENTOR_USERNAME}`,
                });
                console.log(`✅ Created label: ${MENTOR_LABEL}`);
              }
            }

            // ── Apply label if not already present ────────────────────────────
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: itemNum,
            });

            if (labels.some(l => l.name === MENTOR_LABEL)) {
              console.log(`⏭️  ${MENTOR_LABEL} already on ${itemType} #${itemNum} — skipping`);
            } else {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: itemNum, labels: [MENTOR_LABEL],
              });
              console.log(`🏷️  Applied ${MENTOR_LABEL} to ${itemType} #${itemNum}`);
            }
