name: Issues Labeler

on:
  pull_request_target:
    types: [closed, review_requested]
  pull_request_review:
    types: [submitted]
  issues:
    types: [closed, assigned]

concurrency:
  group: mentor-label-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write

jobs:
  apply-mentor-label:
    name: Apply Mentor Label
    runs-on: ubuntu-latest

    steps:
      - name: Ensure mentor label exists and apply it
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const MENTOR_USERNAME = 'Ayushh-Sharmaa';
            const MENTOR_LABEL    = `mentor:${MENTOR_USERNAME}`;
            const LABEL_COLOR     = '6f42c1';

            // ── Ensure the label exists in the repo ───────────────────────
            async function ensureLabel() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: MENTOR_LABEL });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo,
                    name: MENTOR_LABEL,
                    color: LABEL_COLOR,
                    description: `GSSoC: Mentor — @${MENTOR_USERNAME}`,
                  });
                  console.log(`✅ Created label: ${MENTOR_LABEL}`);
                }
              }
            }

            // ── Apply label to a PR or issue (idempotent) ─────────────────
            async function applyTo(number, type) {
              await ensureLabel();
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner, repo, issue_number: number,
              });
              if (labels.some(l => l.name === MENTOR_LABEL)) {
                console.log(`⏭️  ${MENTOR_LABEL} already on ${type} #${number} — skipping`);
                return;
              }
              await github.rest.issues.addLabels({
                owner, repo, issue_number: number, labels: [MENTOR_LABEL],
              });
              console.log(`🏷️  Applied ${MENTOR_LABEL} to ${type} #${number}`);
            }

            const event  = context.eventName;
            const action = context.payload.action;

            // ── Pull request ──────────────────────────────────────────────
            if (event === 'pull_request_target') {
              const pr    = context.payload.pull_request;
              const prNum = pr.number;

              if (action === 'closed') {
                // Only label when the PR was actually MERGED, not just closed
                if (!pr.merged) {
                  console.log(`⏭️  PR #${prNum} was closed without merging — skipping`);
                  return;
                }
                await applyTo(prNum, 'PR');

              } else if (action === 'review_requested') {
                // Only apply when the mentor specifically is added as reviewer
                const reviewer = context.payload.requested_reviewer;
                if (reviewer && reviewer.login === MENTOR_USERNAME) {
                  await applyTo(prNum, 'PR');
                } else {
                  console.log(`⏭️  Reviewer is not @${MENTOR_USERNAME} — skipping`);
                }
              }
            }

            // ── PR review submitted by mentor ─────────────────────────────
            else if (event === 'pull_request_review') {
              const reviewer = context.payload.review.user;
              if (reviewer && reviewer.login === MENTOR_USERNAME) {
                const prNum = context.payload.pull_request.number;
                await applyTo(prNum, 'PR');
              } else {
                console.log(`⏭️  Review not by @${MENTOR_USERNAME} — skipping`);
              }
            }

            // ── Issue: closed or assigned to mentor ───────────────────────
            else if (event === 'issues') {
              const issueNum = context.payload.issue.number;

              if (action === 'closed') {
                await applyTo(issueNum, 'issue');

              } else if (action === 'assigned') {
                // Only apply when assigned specifically to the mentor
                const assignee = context.payload.assignee;
                if (assignee && assignee.login === MENTOR_USERNAME) {
                  await applyTo(issueNum, 'issue');
                } else {
                  console.log(`⏭️  Assignee is not @${MENTOR_USERNAME} — skipping`);
                }
              }
            }
